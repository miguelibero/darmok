syntax = "proto3";

package darmok.protobuf;

import "varying.proto";

message StandardProgram {
    enum Type {
        Unlit = 0;
        ForwardBasic = 1;
        Forward = 2;
        Gui = 3;
        Tonemap = 4;
    }
}

message ProgramRef {
    oneof program {
        string path = 1;
        StandardProgram.Type standard = 2;
    }
}

message SlangProgramSource {
    string name = 1;
    string data = 2;
}

message ProgramSource {
    string name = 1;
    string vertex_shader = 2;
    string fragment_shader = 3;
	Varying varying = 4;
}

message Shader {
    bytes data = 1;
    repeated string defines = 3;
}

message RendererProgram {
    Program.Renderer renderer = 1;
    repeated Shader fragment_shaders = 2;
    repeated Shader vertex_shaders = 3;
}

message Program {
    enum Renderer {
        Unknown = 0;
        Direct3D11 = 1;
        Direct3D12 = 2;
        Metal = 3;
        OpenGLES = 4;
        OpenGL = 5;
        Vulkan = 6;
    }

    string name = 1;
    repeated RendererProgram renderers = 2;
    Varying varying = 3;
}